spring.application.name=media-hub-spring
spring.datasource.url=${MEDIAHUB_DB_URL}
spring.datasource.username=${MEDIAHUB_DB_USERNAME}
spring.datasource.password=${MEDIAHUB_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
jwt.secret=${JWT_PASSWORD}
app.admin-bootstrap.enabled=true
app.admin-bootstrap.email=${MEDIAHUB_ADMIN_EMAIL:}
app.admin-bootstrap.password=${MEDIAHUB_ADMIN_PASSWORD:}
app.admin-bootstrap.sync-password-on-startup=${MEDIAHUB_ADMIN_SYNC_PASSWORD_ON_STARTUP:false}
jwt.expiration=86400000
tmdb.api.key=${TMDB_API_KEY}
omdb.api.key=${OMDB_API_KEY}

app.frontend-base-url=${MEDIAHUB_FRONTEND_BASE_URL:http://localhost:5173}
app.password-reset.expiration-minutes=${MEDIAHUB_PASSWORD_RESET_EXPIRATION_MINUTES:30}

spring.mail.host=${MEDIAHUB_SMTP_HOST:}
spring.mail.port=${MEDIAHUB_SMTP_PORT:587}
spring.mail.username=${MEDIAHUB_SMTP_USERNAME:}
spring.mail.password=${MEDIAHUB_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MEDIAHUB_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MEDIAHUB_SMTP_STARTTLS:true}
